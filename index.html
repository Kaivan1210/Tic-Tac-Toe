<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tic Tac Toe | Kaivan Shah</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    /* ========== LOADING PAGE STYLES ========== */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 50%, #1a1f35 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
    }

    .loading-screen.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    .loading-content {
      text-align: center;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .game-title-loading {
      font-size: 3.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f5b042, #ff6b6b, #4ecdc4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 2rem;
      letter-spacing: 3px;
      font-family: 'Segoe UI', 'Poppins', monospace;
    }

    .loader {
      display: inline-block;
      position: relative;
      width: 80px;
      height: 80px;
      margin: 1.5rem auto;
    }

    .loader div {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f5b042;
      animation: loader-bounce 1.2s linear infinite;
    }

    .loader div:nth-child(1) { top: 8px; left: 8px; animation-delay: 0s; background: #ff6b6b; }
    .loader div:nth-child(2) { top: 8px; right: 8px; animation-delay: -0.4s; background: #4ecdc4; }
    .loader div:nth-child(3) { bottom: 8px; right: 8px; animation-delay: -0.8s; background: #f5b042; }
    .loader div:nth-child(4) { bottom: 8px; left: 8px; animation-delay: -1.2s; background: #a8e6cf; }

    @keyframes loader-bounce {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.6; }
    }

    .loading-text {
      color: #cbd5e1;
      font-size: 1.2rem;
      margin-top: 1.5rem;
      font-family: monospace;
      letter-spacing: 2px;
    }

    .loading-sub {
      color: #64748b;
      font-size: 0.85rem;
      margin-top: 0.8rem;
    }

    .loading-progress {
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin: 1.5rem auto 0;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #f5b042, #ff6b6b, #4ecdc4);
      animation: progressLoad 1.8s ease-out forwards;
      border-radius: 10px;
    }

    @keyframes progressLoad {
      0% { width: 0%; }
      30% { width: 45%; }
      70% { width: 85%; }
      100% { width: 100%; }
    }

    /* Developer Credit Badge */
    .dev-badge {
      position: fixed;
      bottom: 15px;
      right: 15px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-family: monospace;
      color: #f5b042;
      z-index: 100;
      letter-spacing: 1px;
      border-left: 2px solid #f5b042;
      pointer-events: none;
    }

    /* ========== MAIN GAME STYLES ========== */
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a2639 0%, #2a3b4c 100%);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .game-container {
      background: rgba(22, 34, 48, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 4rem;
      padding: 2rem 1.5rem 1.8rem 1.5rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: all 0.2s ease;
    }

    .scoreboard {
      display: flex;
      justify-content: space-between;
      gap: 2rem;
      margin-bottom: 1.8rem;
      background: #0f1722cc;
      padding: 0.7rem 1.5rem;
      border-radius: 100px;
      backdrop-filter: blur(4px);
    }

    .score-card {
      text-align: center;
      background: #11181f;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      min-width: 100px;
      box-shadow: inset 0 1px 2px #ffffff0d, 0 6px 12px rgba(0, 0, 0, 0.2);
    }

    .score-label {
      font-size: 0.8rem;
      letter-spacing: 1px;
      font-weight: 500;
      color: #9ab3d5;
    }

    .score-value {
      font-size: 2rem;
      font-weight: 800;
      color: #f2e8cf;
      line-height: 1;
      text-shadow: 0 2px 5px #00000030;
    }

    .turn-indicator {
      text-align: center;
      background: #0b1620cc;
      margin: 1rem 1rem 1.4rem 1rem;
      padding: 0.7rem;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: bold;
      backdrop-filter: blur(4px);
      color: #eef4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      letter-spacing: 1px;
    }

    .turn-badge {
      background: #2d3e50;
      padding: 0.2rem 1rem;
      border-radius: 32px;
      font-size: 1.3rem;
      box-shadow: inset 0 1px 0 #ffffff30, 0 4px 8px black;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      background-color: #1f2e3b;
      padding: 16px;
      border-radius: 2.5rem;
      box-shadow: inset 0 0 6px #00000055, 0 20px 30px -8px black;
    }

    .cell {
      background: #fef9e8;
      background-image: radial-gradient(circle at 25% 30%, rgba(255,245,215,0.9) 2%, #f4e9d8 90%);
      width: clamp(70px, 22vw, 110px);
      height: clamp(70px, 22vw, 110px);
      border-radius: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.2rem;
      font-weight: 700;
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', sans-serif;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 10px 0 #8b6f4c, 0 4px 12px rgba(0, 0, 0, 0.3);
      color: #2c3e2f;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.05);
    }

    .cell.X {
      color: #c44536;
      text-shadow: 2px 2px 0 #ffd966;
    }

    .cell.O {
      color: #2d6a4f;
      text-shadow: 2px 2px 0 #b7efc5;
    }

    .cell:hover:not(.disabled-cell) {
      transform: scale(0.97);
      background: #fff5e6;
      box-shadow: 0 5px 0 #7b5e3c;
      filter: brightness(1.02);
    }

    .cell.win-highlight {
      background: #f9d56e;
      background: radial-gradient(circle at 30% 20%, #ffe6a3, #f7c56e);
      box-shadow: 0 0 0 2px gold, 0 0 0 4px #ffdd77, 0 6px 12px black;
      transform: scale(1.02);
      transition: 0.1s;
    }

    .disabled-cell {
      cursor: default;
      filter: saturate(0.95);
    }

    .action-buttons {
      display: flex;
      justify-content: center;
      margin-top: 1.8rem;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .btn {
      background: #2c3e50;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.7rem 1.5rem;
      border-radius: 3rem;
      color: #ecf0f1;
      cursor: pointer;
      transition: 0.15s linear;
      box-shadow: 0 4px 6px #00000040;
      font-family: inherit;
      letter-spacing: 0.5px;
    }

    .btn-restart { background: #2c3e50; border-bottom: 3px solid #ffb347; }
    .btn-ai { background: #1e2f3c; border-bottom: 3px solid #74c7b8; }
    .btn-reset-score { background: #232f3b; border-bottom: 3px solid #bc9a6c; }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
    }

    .btn:active { transform: translateY(2px); }

    .message-area {
      text-align: center;
      margin-top: 1rem;
      font-weight: bold;
      font-size: 1rem;
      background: #00000066;
      padding: 0.5rem;
      border-radius: 50px;
      color: #f3d382;
      min-height: 3rem;
    }

    @media (max-width: 550px) {
      .game-container { padding: 1rem; }
      .cell { font-size: 2.8rem; width: clamp(65px, 20vw, 85px); height: clamp(65px, 20vw, 85px); }
      .score-card { min-width: 70px; }
      .turn-badge { font-size: 1rem; }
      .btn { font-size: 0.8rem; padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>

<!-- PROFESSIONAL LOADING PAGE -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-content">
    <div class="game-title-loading">⚡ TIC TAC TOE ⚡</div>
    <div class="loader">
      <div></div><div></div><div></div><div></div>
    </div>
    <div class="loading-text">Loading Game Arena</div>
    <div class="loading-sub">Preparing immersive experience</div>
    <div class="loading-progress">
      <div class="progress-bar"></div>
    </div>
  </div>
</div>

<!-- Developer Badge (persistent) -->
<div class="dev-badge">🎮 Developed by Kaivan Shah</div>

<!-- MAIN GAME CONTAINER (Initially hidden until loading completes) -->
<div class="game-container" id="gameContainer" style="opacity: 0; transform: scale(0.95); transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);">
  <div class="scoreboard">
    <div class="score-card"><div class="score-label">Player X</div><div class="score-value" id="scoreX">0</div></div>
    <div class="score-card"><div class="score-label">Player O</div><div class="score-value" id="scoreO">0</div></div>
  </div>
  <div class="turn-indicator"><span>🎮 Turn</span><span class="turn-badge" id="turnText">Player X</span></div>
  <div class="board" id="board"></div>
  <div class="action-buttons">
    <button class="btn btn-restart" id="restartBtn">⟳ Restart Game</button>
    <button class="btn btn-ai" id="aiToggleBtn">🤖 Play vs AI</button>
    <button class="btn btn-reset-score" id="resetScoreBtn">🏆 Reset Scores</button>
  </div>
  <div class="message-area" id="messageArea">✨ Click any cell to start</div>
</div>

<script>
  // ========== LOADING SEQUENCE ==========
  window.addEventListener('DOMContentLoaded', () => {
    const loadingScreen = document.getElementById('loadingScreen');
    const gameContainer = document.getElementById('gameContainer');
    
    // Simulate loading resources (minimum 2 seconds for professional feel)
    setTimeout(() => {
      loadingScreen.classList.add('fade-out');
      gameContainer.style.opacity = '1';
      gameContainer.style.transform = 'scale(1)';
      
      // Remove loading screen from DOM after transition
      setTimeout(() => {
        if (loadingScreen.parentNode) loadingScreen.parentNode.removeChild(loadingScreen);
      }, 800);
    }, 2200);
  });

  // ========== GAME LOGIC ==========
  const boardElement = document.getElementById('board');
  const turnTextSpan = document.getElementById('turnText');
  const messageDiv = document.getElementById('messageArea');
  const scoreXSpan = document.getElementById('scoreX');
  const scoreOSpan = document.getElementById('scoreO');
  const restartBtn = document.getElementById('restartBtn');
  const aiToggleBtn = document.getElementById('aiToggleBtn');
  const resetScoreBtn = document.getElementById('resetScoreBtn');

  let board = Array(9).fill(null);
  let currentPlayer = 'X';
  let gameActive = true;
  let winnerInfo = null;
  let vsAI = false;
  let aiThinking = false;
  let score = { X: 0, O: 0 };

  // Sound Effects (Web Audio)
  function playClickSound() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.frequency.value = 880;
      gainNode.gain.value = 0.12;
      oscillator.type = 'sine';
      oscillator.start();
      gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
      oscillator.stop(audioCtx.currentTime + 0.2);
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) { /* silent fallback */ }
  }

  function playWinSound() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 523.25;
      gain.gain.value = 0.18;
      osc.type = 'triangle';
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
      osc.stop(audioCtx.currentTime + 0.5);
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) {}
  }

  function playDrawSound() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 330;
      gain.gain.value = 0.1;
      osc.type = 'sawtooth';
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.35);
      osc.stop(audioCtx.currentTime + 0.35);
      if (audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e) {}
  }

  const winPatterns = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
  ];

  function checkWinnerAndCombo(boardArr) {
    for (let pattern of winPatterns) {
      const [a,b,c] = pattern;
      if (boardArr[a] && boardArr[a] === boardArr[b] && boardArr[a] === boardArr[c]) {
        return { winner: boardArr[a], combo: pattern };
      }
    }
    return null;
  }

  function isDraw(boardArr) {
    return boardArr.every(cell => cell !== null) && !checkWinnerAndCombo(boardArr);
  }

  function renderBoard() {
    const cells = document.querySelectorAll('.cell');
    for (let i = 0; i < 9; i++) {
      const mark = board[i];
      cells[i].innerText = mark || '';
      if (mark === 'X') {
        cells[i].classList.add('X');
        cells[i].classList.remove('O');
      } else if (mark === 'O') {
        cells[i].classList.add('O');
        cells[i].classList.remove('X');
      } else {
        cells[i].classList.remove('X', 'O');
      }
      if (!gameActive || board[i] !== null || winnerInfo !== null) {
        cells[i].classList.add('disabled-cell');
      } else {
        cells[i].classList.remove('disabled-cell');
      }
    }
    document.querySelectorAll('.cell').forEach(cell => cell.classList.remove('win-highlight'));
    if (winnerInfo && winnerInfo.combo) {
      const cellsNodes = document.querySelectorAll('.cell');
      winnerInfo.combo.forEach(idx => { cellsNodes[idx].classList.add('win-highlight'); });
    }
  }

  function updateStatusMessage() {
    if (!gameActive) {
      if (winnerInfo) {
        turnTextSpan.innerText = `✨ ${winnerInfo.winner} Wins! ✨`;
        messageDiv.innerHTML = `🎉 Player ${winnerInfo.winner} Wins! 🎉 Great game!`;
      } else if (isDraw(board)) {
        turnTextSpan.innerText = `🤝 Draw!`;
        messageDiv.innerHTML = `😐 It's a Draw! Start a new round.`;
      }
    } else {
      turnTextSpan.innerText = `Player ${currentPlayer}`;
      messageDiv.innerHTML = vsAI && currentPlayer === 'O' ? `🤖 AI is thinking ...` : `Player ${currentPlayer}'s turn`;
    }
  }

  function updateScoresUI() {
    scoreXSpan.innerText = score.X;
    scoreOSpan.innerText = score.O;
  }

  function endGame(winner, winCombo = null) {
    if (!gameActive) return;
    gameActive = false;
    if (winner) {
      winnerInfo = { winner, combo: winCombo };
      score[winner]++;
      updateScoresUI();
      playWinSound();
      messageDiv.innerHTML = `🎉 Player ${winner} Wins! 🎉`;
      turnTextSpan.innerText = `🏆 ${winner} Wins! 🏆`;
    } else {
      winnerInfo = null;
      playDrawSound();
      messageDiv.innerHTML = `😐 It's a Draw! Press Restart.`;
      turnTextSpan.innerText = `🤝 Draw!`;
    }
    renderBoard();
    updateStatusMessage();
  }

  function resetRound() {
    board = Array(9).fill(null);
    currentPlayer = 'X';
    gameActive = true;
    winnerInfo = null;
    aiThinking = false;
    renderBoard();
    updateStatusMessage();
    if (vsAI && currentPlayer === 'O') aiMoveAsync(); // edge case
  }

  function makeMove(index, playerMark) {
    if (!gameActive) return false;
    if (board[index] !== null) return false;
    if (playerMark !== currentPlayer) return false;

    board[index] = currentPlayer;
    playClickSound();
    renderBoard();

    const winCheck = checkWinnerAndCombo(board);
    if (winCheck) {
      endGame(winCheck.winner, winCheck.combo);
      return true;
    }
    if (isDraw(board)) {
      endGame(null);
      return true;
    }
    currentPlayer = (currentPlayer === 'X') ? 'O' : 'X';
    updateStatusMessage();
    renderBoard();
    return true;
  }

  // AI: smart blocking + winning priority
  function getBestAIMove() {
    for (let i = 0; i < 9; i++) {
      if (board[i] === null) {
        board[i] = 'O';
        let win = checkWinnerAndCombo(board);
        board[i] = null;
        if (win && win.winner === 'O') return i;
      }
    }
    for (let i = 0; i < 9; i++) {
      if (board[i] === null) {
        board[i] = 'X';
        let win = checkWinnerAndCombo(board);
        board[i] = null;
        if (win && win.winner === 'X') return i;
      }
    }
    if (board[4] === null) return 4;
    const corners = [0,2,6,8];
    const freeCorners = corners.filter(i => board[i] === null);
    if (freeCorners.length) return freeCorners[Math.floor(Math.random() * freeCorners.length)];
    const empty = board.reduce((arr, cell, idx) => { if(cell===null) arr.push(idx); return arr;}, []);
    if (empty.length) return empty[Math.floor(Math.random() * empty.length)];
    return -1;
  }

  async function aiMoveAsync() {
    if (!vsAI || !gameActive || currentPlayer !== 'O' || aiThinking) return;
    aiThinking = true;
    await new Promise(resolve => setTimeout(resolve, 280));
    if (!gameActive || currentPlayer !== 'O') { aiThinking = false; return; }
    const moveIndex = getBestAIMove();
    if (moveIndex !== -1 && board[moveIndex] === null) makeMove(moveIndex, 'O');
    aiThinking = false;
  }

  function onCellClick(index) {
    if (!gameActive) return;
    if (vsAI && currentPlayer === 'O') {
      messageDiv.innerHTML = "🤖 AI is thinking, wait...";
      return;
    }
    if (board[index] !== null) return;
    makeMove(index, currentPlayer);
    if (gameActive && vsAI && currentPlayer === 'O') aiMoveAsync();
  }

  function createBoardUI() {
    boardElement.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.setAttribute('data-index', i);
      cell.addEventListener('click', (e) => {
        const idx = parseInt(cell.getAttribute('data-index'));
        onCellClick(idx);
      });
      boardElement.appendChild(cell);
    }
  }

  function toggleAIMode() {
    vsAI = !vsAI;
    if (vsAI) {
      aiToggleBtn.textContent = "🧑‍🤝‍🧑 2-Player Mode";
      aiToggleBtn.style.background = "#3a5a6e";
      messageDiv.innerHTML = "🤖 AI Mode Activated! You are X, AI is O. Restarting...";
    } else {
      aiToggleBtn.textContent = "🤖 Play vs AI";
      aiToggleBtn.style.background = "#1e2f3c";
      messageDiv.innerHTML = "👥 Two-player mode. Enjoy!";
    }
    resetRound();
  }

  function resetScores() {
    score = { X: 0, O: 0 };
    updateScoresUI();
    resetRound();
    messageDiv.innerHTML = "Scores reset! Play again!";
  }

  function init() {
    createBoardUI();
    resetRound();
    updateScoresUI();
    restartBtn.addEventListener('click', () => resetRound());
    aiToggleBtn.addEventListener('click', toggleAIMode);
    resetScoreBtn.addEventListener('click', resetScores);
  }

  init();
</script>
</body>
</html>
